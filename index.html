<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEFL Practice</title>
<style>
  :root {
    --bg: #f0f4f8;
    --card: #ffffff;
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --success: #16a34a;
    --error: #dc2626;
    --warning: #d97706;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--primary);
    color: white;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  header h1 { font-size: 1.4rem; font-weight: 700; }
  header .subtitle { font-size: 0.85rem; opacity: 0.85; }

  .score-badge {
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.85rem;
    font-weight: 600;
  }

  nav {
    display: flex;
    gap: 0;
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }

  nav button {
    background: none;
    border: none;
    padding: 14px 20px;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--muted);
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
  }

  nav button.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
  }

  nav button:hover:not(.active) { color: var(--text); }

  .tab-icon { margin-right: 6px; }

  main { max-width: 800px; margin: 32px auto; padding: 0 20px; }

  .section { display: none; }
  .section.active { display: block; }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    margin-bottom: 20px;
  }

  .question-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .question-counter {
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 500;
    background: var(--bg);
    padding: 4px 10px;
    border-radius: 20px;
  }

  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    margin-bottom: 24px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--primary);
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; }
  h3 { font-size: 1rem; font-weight: 600; color: var(--muted); margin-bottom: 16px; }

  /* ── READING ─────────────────────── */
  .passage {
    font-size: 1.05rem;
    line-height: 1.85;
    color: var(--text);
  }

  .blank-input {
    display: inline-block;
    border: none;
    border-bottom: 2px solid var(--primary);
    background: #eff6ff;
    padding: 2px 8px;
    font-size: 1rem;
    font-family: inherit;
    color: var(--primary);
    width: 130px;
    outline: none;
    border-radius: 4px 4px 0 0;
    transition: all 0.2s;
  }

  .blank-input:focus { background: #dbeafe; }
  .blank-input.correct { border-bottom-color: var(--success); background: #f0fdf4; color: var(--success); }
  .blank-input.incorrect { border-bottom-color: var(--error); background: #fef2f2; color: var(--error); }

  .hint-text {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 12px;
    font-style: italic;
  }

  .letter-hint {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin: 14px 0 6px;
    align-items: flex-end;
  }

  .letter-box {
    width: 30px;
    height: 36px;
    border-bottom: 2px solid var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--primary);
    background: #eff6ff;
    border-radius: 4px 4px 0 0;
  }

  .letter-box.blank {
    color: transparent;
    background: #f8fafc;
    border-bottom-color: var(--border);
  }

  .word-input-wrap {
    margin-top: 10px;
  }

  .blank-marker {
    display: inline-block;
    border-bottom: 2px solid var(--primary);
    color: var(--primary);
    font-weight: 600;
    padding: 0 4px;
    min-width: 80px;
    text-align: center;
  }

  /* ── LISTENING ───────────────────── */
  .listen-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .play-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  .play-btn:hover { background: var(--primary-dark); }
  .play-btn:disabled { background: var(--muted); cursor: not-allowed; }

  .play-badge {
    font-size: 0.75rem;
    background: rgba(255,255,255,0.25);
    padding: 2px 8px;
    border-radius: 10px;
  }

  .transcript-area {
    width: 100%;
    min-height: 90px;
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-size: 1rem;
    font-family: inherit;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  .transcript-area:focus { border-color: var(--primary); }
  .transcript-area.correct { border-color: var(--success); background: #f0fdf4; }
  .transcript-area.incorrect { border-color: var(--error); background: #fef2f2; }

  .listen-tip {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 8px;
  }

  /* ── WRITING ─────────────────────── */
  .writing-context {
    background: #f0f9ff;
    border-left: 4px solid #0ea5e9;
    border-radius: 6px;
    padding: 10px 14px;
    margin-bottom: 16px;
    font-size: 0.97rem;
    line-height: 1.6;
    color: var(--text);
  }

  .context-label {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #0ea5e9;
    background: #e0f2fe;
    border-radius: 10px;
    padding: 1px 8px;
    margin-right: 8px;
    vertical-align: middle;
  }

  .sentence-target {
    font-size: 1rem;
    color: var(--muted);
    margin-bottom: 16px;
    padding: 12px;
    background: var(--bg);
    border-radius: 8px;
    border-left: 4px solid var(--primary);
  }

  .answer-slots {
    min-height: 52px;
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    margin-bottom: 16px;
    transition: border-color 0.2s;
    cursor: pointer;
  }

  .answer-slots.drag-over { border-color: var(--primary); background: #eff6ff; }
  .answer-slots.correct { border-color: var(--success); background: #f0fdf4; }
  .answer-slots.incorrect { border-color: var(--error); background: #fef2f2; }

  .answer-slots .empty-hint {
    color: var(--muted);
    font-size: 0.9rem;
    user-select: none;
  }

  .word-bank {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }

  .word-chip {
    background: #eff6ff;
    color: var(--primary);
    border: 1px solid #bfdbfe;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.92rem;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }

  .word-chip:hover { background: #dbeafe; transform: translateY(-1px); }
  .word-chip.used { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

  .placed-word {
    background: var(--primary);
    color: white;
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 0.92rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .placed-word .remove-x {
    font-size: 0.8rem;
    opacity: 0.7;
    font-weight: bold;
  }

  .placed-word:hover .remove-x { opacity: 1; }

  /* ── BUTTONS & FEEDBACK ──────────── */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }

  .feedback {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 0.95rem;
    display: none;
  }

  .feedback.show { display: block; }
  .feedback.success { background: #f0fdf4; color: var(--success); border: 1px solid #bbf7d0; }
  .feedback.error { background: #fef2f2; color: var(--error); border: 1px solid #fecaca; }

  .feedback strong { display: block; margin-bottom: 4px; }

  /* ── COMPLETION SCREEN ───────────── */
  .completion {
    text-align: center;
    padding: 40px 20px;
  }

  .completion .trophy { font-size: 4rem; margin-bottom: 16px; }
  .completion h2 { font-size: 1.6rem; margin-bottom: 8px; }
  .completion p { color: var(--muted); margin-bottom: 24px; }

  .score-display {
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--primary);
    margin: 16px 0;
  }

  /* ── TIMER ───────────────────────── */
  .timer-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
  }
  .timer-wrap svg { position: absolute; top: 0; left: 0; }
  .timer-num {
    position: relative;
    font-size: 0.78rem;
    font-weight: 700;
    z-index: 1;
  }

  /* ── HISTORY NAV ─────────────────── */
  .hist-nav {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 16px;
    margin-bottom: 16px;
  }
  .hist-label {
    flex: 1;
    text-align: center;
    font-size: 0.82rem;
    color: var(--muted);
    font-weight: 500;
  }
  .hist-label.review-label { color: var(--warning); }
  .btn-sm { padding: 5px 12px; font-size: 0.8rem; }
  .btn-sm:disabled { opacity: 0.35; cursor: default; }

  /* ── REVIEW CARD ─────────────────── */
  .review-card { border: 2px solid var(--warning); }
  .review-banner {
    background: var(--warning);
    color: white;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 4px 10px;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 12px;
  }

  /* ── RESPONSIVE ──────────────────── */
  @media (max-width: 600px) {
    main { padding: 0 12px; margin: 20px auto; }
    .card { padding: 20px 16px; }
    nav button { padding: 12px 12px; font-size: 0.85rem; }
    .play-btn { padding: 9px 14px; }
  }
</style>
</head>

<nav>

  <button onclick="showTab('writing')"><span class="tab-icon">✏️</span>Writing</button>
</nav>

<main>

  <section id="reading" class="section active"></section>

  <!-- ══════════════════════════════════════════ WRITING -->
  <section id="writing" class="section"></section>

</main>

<script src="questions.js"></script>
<script src="writing-questions.js"></script>

// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────
function freshModState(extra) {
  return Object.assign({ qIndex: 0, score: 0, total: 0, checked: false, history: [], reviewIdx: -1 }, extra);
}
const state = {
  reading:   freshModState(),
  listening: freshModState({ plays: 0 }),
  writing:   freshModState({ placed: [], shuffledWords: [] }),
};

// ─────────────────────────────────────────────────────────────
// TIMER  (20 seconds per live question)
// ─────────────────────────────────────────────────────────────
const TIMER_SEC = 20;
const _timers = {};

function startTimer(mod) {
  stopTimer(mod);
  let rem = TIMER_SEC;
  _paintTimer(mod, rem);
  _timers[mod] = setInterval(() => {
    rem--;
    _paintTimer(mod, rem);
    if (rem <= 0) { stopTimer(mod); _timerExpired(mod); }
  }, 1000);
}

function stopTimer(mod) {
  if (_timers[mod]) { clearInterval(_timers[mod]); _timers[mod] = null; }
}

function stopAllTimers() { ['reading','listening','writing'].forEach(stopTimer); }

function _paintTimer(mod, rem) {
  const el = document.getElementById('timer-' + mod);
  if (!el) return;
  const circ = 2 * Math.PI * 15;
  const offset = circ * (1 - rem / TIMER_SEC);
  const col = rem > 10 ? '#2563eb' : rem > 5 ? '#d97706' : '#dc2626';
  el.innerHTML = `<svg viewBox="0 0 36 36" width="44" height="44">
    <circle cx="18" cy="18" r="15" fill="none" stroke="#e2e8f0" stroke-width="3"/>
    <circle cx="18" cy="18" r="15" fill="none" stroke="${col}" stroke-width="3"
      stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"
      transform="rotate(-90 18 18)" style="transition:stroke-dashoffset .9s linear,stroke .3s"/>
  </svg><span class="timer-num" style="color:${col}">${rem}</span>`;
}

function _timerExpired(mod) {
  if (mod === 'reading'   && !state.reading.checked)   checkReading(true);
  if (mod === 'listening' && !state.listening.checked) checkListening(true);
  if (mod === 'writing'   && !state.writing.checked)   checkWriting(true);
}

// ─────────────────────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────────────────────

function showTab(tab) {
  stopAllTimers();
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => {
    if (b.textContent.toLowerCase().includes(tab)) b.classList.add('active');
  });
  const s = state[tab];
  if (s && s.reviewIdx === -1 && !s.checked) startTimer(tab);
}

// ─────────────────────────────────────────────────────────────
// HISTORY NAV  (shared)
// ─────────────────────────────────────────────────────────────
function histNavHTML(mod) {
  const s = state[mod];
  const answered = s.history.length;
  if (answered === 0) return '';
  const atLive = s.reviewIdx === -1;
  const canPrev = atLive ? answered > 0 : s.reviewIdx > 0;
  const canNext = !atLive;
  const label = atLive
    ? `<span class="hist-label">Live &nbsp;·&nbsp; ${answered} answered</span>`
    : `<span class="hist-label review-label">Reviewing ${s.reviewIdx + 1} / ${answered}</span>`;
  return `<div class="hist-nav">
    <button class="btn btn-secondary btn-sm" onclick="histPrev('${mod}')" ${canPrev?'':'disabled'}>← Previous</button>
    ${label}
    <button class="btn btn-secondary btn-sm" onclick="histNext('${mod}')" ${canNext?'':'disabled'}>Next →</button>
  </div>`;
}

function histPrev(mod) {
  const s = state[mod];
  stopTimer(mod);
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  if (s.reviewIdx === -1) s.reviewIdx = s.history.length - 1;
  else if (s.reviewIdx > 0) s.reviewIdx--;
  renderReview(mod);
}

function histNext(mod) {
  const s = state[mod];
  if (s.reviewIdx === -1) return;
  if (s.reviewIdx < s.history.length - 1) { s.reviewIdx++; renderReview(mod); }
  else {
    s.reviewIdx = -1;
    ({ reading: renderReading, listening: renderListening, writing: renderWriting })[mod]();
    if (!s.checked) startTimer(mod);
  }
}

// REVIEW RENDERER
// ─────────────────────────────────────────────────────────────
function renderReview(mod) {
  const s = state[mod];
  const entry = s.history[s.reviewIdx];
  const el = document.getElementById(mod);
  const nav = histNavHTML(mod);

  if (mod === 'reading') {
    const passageHTML = entry.q.p.replace('[B]', '<span class="blank-marker">___________</span>');
    const inputCls = entry.correct ? 'correct' : 'incorrect';
    const fbCls = entry.correct ? 'success' : 'error';
    const fbMsg = entry.correct
      ? `<strong>Correct!</strong> The word is "<em>${entry.q.a}</em>".`
      : `<strong>Not quite.</strong> You typed "<em>${entry.userAnswer || '(blank)'}</em>". Answer: "<em>${entry.q.a}</em>" — ${entry.q.h}`;
    el.innerHTML = `<div class="card review-card">
      <div class="review-banner">Reviewing past question</div>
      <div class="question-header"><h2>Fill in the Blank</h2></div>
      <div class="passage" style="margin-bottom:18px">${passageHTML}</div>
      <div class="letter-hint">${makeLetterHint(entry.q.a)}</div>
      <div style="font-size:0.8rem;color:var(--muted);margin-bottom:10px;font-style:italic">Clue: ${entry.q.h}</div>
      <input class="blank-input ${inputCls}" value="${entry.userAnswer || ''}" readonly style="width:220px;padding:6px 10px"/>
      <div class="feedback show ${fbCls}" style="margin-top:12px">${fbMsg}</div>
    </div>${nav}`;
  }

  if (mod === 'listening') {
    const inputCls = entry.correct ? 'correct' : 'incorrect';
    const fbCls = entry.correct ? 'success' : 'error';
    const fbMsg = entry.correct
      ? `<strong>Great job!</strong> ${Math.round(entry.accuracy * 100)}% accuracy.<br><em>Original: "${entry.q.sentence}"</em>`
      : `<strong>${Math.round(entry.accuracy * 100)}% accuracy.</strong><br><em>Original: "${entry.q.sentence}"</em>`;
    el.innerHTML = `<div class="card review-card">
      <div class="review-banner">Reviewing past question</div>
      <div class="question-header"><h2>Listen &amp; Transcribe</h2></div>
      <button class="play-btn" onclick="replayAudio('${entry.q.sentence.replace(/'/g,"\\'")}')">▶ Replay</button>
      <textarea class="transcript-area ${inputCls}" readonly rows="3" style="margin-top:14px">${entry.userTranscript}</textarea>
      <div class="feedback show ${fbCls}" style="margin-top:12px">${fbMsg}</div>
    </div>${nav}`;
  }

  if (mod === 'writing') {
    const slotCls = entry.correct ? 'correct' : 'incorrect';
    const fbCls = entry.correct ? 'success' : 'error';
    const fbMsg = entry.correct
      ? `<strong>Perfect!</strong> That's exactly right.`
      : `<strong>Not quite.</strong> Correct sentence:<br><em>"${entry.q.s}"</em>`;
    const contextHTML = entry.q.c
      ? `<div class="writing-context"><span class="context-label">Context</span>${entry.q.c}</div>` : '';
    const placedHTML = entry.userSentence
      ? entry.userSentence.split(' ').map(w => `<div class="placed-word" style="cursor:default">${w}</div>`).join('')
      : '<span class="empty-hint">(nothing placed)</span>';
    el.innerHTML = `<div class="card review-card">
      <div class="review-banner">Reviewing past question</div>
      <div class="question-header"><h2>Build the Sentence</h2></div>
      ${contextHTML}
      <div class="answer-slots ${slotCls}" style="margin-bottom:12px">${placedHTML}</div>
      <div class="feedback show ${fbCls}">${fbMsg}</div>
    </div>${nav}`;
  }
}

function replayAudio(sentence) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(sentence);
  u.rate = 0.88; u.lang = 'en-US';
  const v = window.speechSynthesis.getVoices();
  const pref = v.find(x => x.lang==='en-US' && x.name.includes('Google')) || v.find(x => x.lang==='en-US') || v[0];
  if (pref) u.voice = pref;
  window.speechSynthesis.speak(u);
}

function checkReading(timedOut) {
  const s = state.reading;
  if (s.checked) return;

  stopTimer('reading');
  const q = readingQuestions[s.qIndex];
  const inp = document.getElementById('readInput');
  const val = (inp ? inp.value : '').trim().toLowerCase();
  const isCorrect = val === q.a.toLowerCase();
  s.total++;
  if (isCorrect) s.score++;
  s.history.push({ q, userAnswer: inp ? inp.value.trim() : '', correct: isCorrect });
  updateTotalScore();
  if (inp) { inp.readOnly = true; inp.classList.add(isCorrect ? 'correct' : 'incorrect'); }
  const fb = document.getElementById('reading-feedback');
  if (fb) {
    fb.classList.add('show', isCorrect ? 'success' : 'error');
    fb.innerHTML = isCorrect
      ? `<strong>${timedOut ? 'Time up — but correct!' : 'Correct!'}</strong> The word is "<em>${q.a}</em>".`
      : `<strong>${timedOut ? 'Time up!' : 'Not quite.'}</strong> The answer is "<em>${q.a}</em>" — ${q.h}`;
  }
  const nb = document.getElementById('nextReadingBtn'); if (nb) nb.style.display = 'inline-block';
}

function skipReading() {
  const s = state.reading;
  stopTimer('reading');
  s.history.push({ q: readingQuestions[s.qIndex], userAnswer: '', correct: false, skipped: true });
  s.total++;
  s.qIndex++;
  s.checked = false;
  renderReading();
}

function normalize(str) {
  return str.toLowerCase().replace(/[.,!?;:'"()\-–—]/g, '').replace(/\s+/g, ' ').trim();
}

function wordSimilarity(a, b) {
  if (a === b) return 1;
  const la = a.length, lb = b.length;
  const dp = Array.from({length: la+1}, (_, i) => Array.from({length: lb+1}, (_, j) => i === 0 ? j : j === 0 ? i : 0));
  for (let i = 1; i <= la; i++)
    for (let j = 1; j <= lb; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return 1 - dp[la][lb] / Math.max(la, lb);
}

function checkListening(timedOut) {
  const s = state.listening;
  if (s.checked) return;
  s.checked = true;
  stopTimer('listening');
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  const q = listeningQuestions[s.qIndex];
  const input = document.getElementById('listenInput');
  const transcript = input ? input.value : '';
  const userWords = normalize(transcript).split(' ');
  const correctWords = normalize(q.sentence).split(' ');
  let matched = 0;
  correctWords.forEach(cw => { if (userWords.some(uw => wordSimilarity(uw, cw) >= 0.8)) matched++; });
  const accuracy = matched / correctWords.length;
  const isCorrect = accuracy >= 0.85;
  s.total++;
  if (isCorrect) s.score++;
  s.history.push({ q, userTranscript: transcript, accuracy, correct: isCorrect });
  updateTotalScore();
  if (input) { input.readOnly = true; input.classList.add(isCorrect ? 'correct' : 'incorrect'); }
  const fb = document.getElementById('listening-feedback');
  if (fb) {
    fb.classList.add('show', isCorrect ? 'success' : 'error');
    fb.innerHTML = isCorrect
      ? `<strong>${timedOut ? 'Time up — but great!' : 'Great job!'}</strong> ${Math.round(accuracy*100)}% accuracy.<br><em>Original: "${q.sentence}"</em>`
      : `<strong>${timedOut ? 'Time up! ' : ''}${Math.round(accuracy*100)}% accuracy.</strong><br><em>Original: "${q.sentence}"</em>`;
  }
  const nb = document.getElementById('nextListenBtn'); if (nb) nb.style.display = 'inline-block';
}

function nextListening() {
  state.listening.qIndex++;
  state.listening.plays = 0;
  state.listening.checked = false;
  renderListening();
}

// ─────────────────────────────────────────────────────────────
// ── WRITING MODULE
// ─────────────────────────────────────────────────────────────

function renderWriting() {
  const s = state.writing;
  const el = document.getElementById('writing');
  if (s.reviewIdx !== -1) { renderReview('writing'); return; }
  if (s.qIndex >= writingQuestions.length) {
    stopTimer('writing');
    el.innerHTML = completionHTML('writing', s.score, s.total, writingQuestions.length) + histNavHTML('writing');
    return;
  }
  const q = writingQuestions[s.qIndex];
  const progress = (s.qIndex / writingQuestions.length) * 100;
  s.placed = [];
  s.shuffledWords = [...q.w].sort(() => Math.random() - 0.5);
  const contextHTML = q.c
    ? `<div class="writing-context"><span class="context-label">Context</span>${q.c}</div>` : '';
  el.innerHTML = `
    <div class="card">
      <div class="question-header">
        <h2>Build the Sentence</h2>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="question-counter">${s.qIndex + 1} / ${writingQuestions.length}</span>
          <div class="timer-wrap" id="timer-writing"></div>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      ${contextHTML}
      <h3>Arrange the words to complete the sentence:</h3>
      <div class="answer-slots" id="answerSlots">
        <span class="empty-hint">Click words below to add them here</span>
      </div>
      <div class="word-bank" id="wordBank"></div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="clearWriting()">Clear</button>
        <button class="btn btn-primary" onclick="checkWriting()">Check Answer</button>
        <button class="btn btn-secondary" onclick="nextWriting()" id="nextWritingBtn" style="display:none">Next →</button>
      </div>
      <div class="feedback" id="writing-feedback"></div>
    </div>
    ${histNavHTML('writing')}
    <div class="card" style="font-size:0.88rem;color:var(--muted)">
      <strong style="color:var(--text)">Writing Score:</strong> ${s.score} of ${s.total} correct
    </div>`;
  const bankEl = document.getElementById('wordBank');
  s.shuffledWords.forEach((word, idx) => {
    const chip = document.createElement('div');
    chip.className = 'word-chip';
    chip.textContent = word;
    chip.dataset.idx = idx;
    chip.dataset.word = word;
    chip.onclick = () => placeWord(chip);
    bankEl.appendChild(chip);
  });
  startTimer('writing');
}

function placeWord(chip) {
  if (chip.classList.contains('used')) return;
  chip.classList.add('used');

  const s = state.writing;
  s.placed.push({ word: chip.dataset.word, chipIdx: chip.dataset.idx });
  refreshAnswerSlots();
}

function removeWord(chipIdx) {
  const s = state.writing;
  const i = s.placed.findIndex(p => p.chipIdx == chipIdx);
  if (i === -1) return;
  s.placed.splice(i, 1);

  // Re-enable chip in bank
  const chip = document.querySelector(`.word-chip[data-idx="${chipIdx}"]`);
  if (chip) chip.classList.remove('used');

  refreshAnswerSlots();
}

function refreshAnswerSlots() {
  const s = state.writing;
  const slots = document.getElementById('answerSlots');
  if (!slots) return;

  if (s.placed.length === 0) {
    slots.innerHTML = '<span class="empty-hint">Click words below to add them here</span>';
    return;
  }

  slots.innerHTML = '';
  s.placed.forEach(p => {
    const pw = document.createElement('div');
    pw.className = 'placed-word';
    pw.innerHTML = `${p.word} <span class="remove-x" onclick="removeWord('${p.chipIdx}')">✕</span>`;
    slots.appendChild(pw);
  });
}

function clearWriting() {
  state.writing.placed = [];
  document.querySelectorAll('.word-chip').forEach(c => c.classList.remove('used'));
  refreshAnswerSlots();
}

function checkWriting(timedOut) {
  const s = state.writing;
  if (s.checked) return;
  s.checked = true;
  stopTimer('writing');
  const q = writingQuestions[s.qIndex];
  const userSentence = s.placed.map(p => p.word).join(' ');
  const correct = normalize(userSentence) === normalize(q.s);
  s.total++;
  if (correct) s.score++;
  s.history.push({ q, userSentence, correct });
  updateTotalScore();
  const slots = document.getElementById('answerSlots');
  const fb = document.getElementById('writing-feedback');
  if (slots) slots.classList.add(correct ? 'correct' : 'incorrect');
  if (fb) {
    fb.classList.add('show', correct ? 'success' : 'error');
    fb.innerHTML = correct
      ? `<strong>${timedOut ? 'Time up — but perfect!' : 'Perfect!'}</strong> That's exactly right.`
      : `<strong>${timedOut ? 'Time up!' : 'Not quite.'}</strong> Correct sentence:<br><em>"${q.s}"</em>`;
  }
  document.querySelectorAll('.word-chip').forEach(c => c.style.pointerEvents = 'none');
  document.querySelectorAll('.placed-word .remove-x').forEach(x => x.style.display = 'none');
  const nb = document.getElementById('nextWritingBtn'); if (nb) nb.style.display = 'inline-block';
}

function nextWriting() {
  state.writing.qIndex++;
  state.writing.placed = [];
  state.writing.checked = false;
  renderWriting();
}

// ─────────────────────────────────────────────────────────────
// COMPLETION SCREEN
// ─────────────────────────────────────────────────────────────

function completionHTML(module, score, total, count) {
  const pct = total > 0 ? Math.round((score / total) * 100) : 0;
  const emoji = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : '💪';
  const msg = pct >= 80 ? 'Outstanding work!' : pct >= 60 ? 'Good progress!' : 'Keep practicing!';
  return `<div class="card completion">
    <div class="trophy">${emoji}</div>
    <h2>${msg}</h2>
    <div class="score-display">${score} / ${total}</div>
    <p>${pct}% accuracy · ${count} questions</p>
    <button class="btn btn-primary" onclick="restartModule('${module}')">Restart</button>
  </div>`;
}

function restartModule(module) {
  stopTimer(module);
  const extra = module==='writing' ? {placed:[],shuffledWords:[]} : module==='listening' ? {plays:0} : {};
  Object.assign(state[module], freshModState(extra));
  if (module === 'reading') initReading();
  if (module === 'writing') initWriting();
  const renders = { reading: renderReading, listening: renderListening, writing: renderWriting };
  renders[module]();
  updateTotalScore();
}

// ─────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────

// Pre-load TTS voices (Chrome loads them async)
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

initReading();
initWriting();
renderReading();
renderListening();
renderWriting();
</script>
</body>
</html>
